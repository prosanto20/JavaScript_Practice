<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Object Model</title>
</head>
<body style ="background-color:#212121; color: #fff;" >
    
</body>

<script>
    const divElement = document.createElement('div')
    console.log(divElement);
    divElement.className = "main"
    //divElement.id = Math.random()*10 +1
    divElement.id = Math.round(Math.random()*10 +1)

    divElement.setAttribute("title","generate a title")
    divElement.style.backgroundColor = "green"
    divElement.style.padding = "15px"
    //divElement.innerText = "Pro Code"

    const addText = document.createTextNode("Creating div")
    divElement.appendChild(addText)

    document.body.appendChild(divElement)

</script>
</html>
